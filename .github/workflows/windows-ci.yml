name: windows-ci

# Runs the standalone password-protect tool on a REAL Windows host so the
# scripts and the bundled qpdf.exe is actually executed — the kind of
# verification that cannot happen in a Linux dev container. WPF dialogs need an
# interactive desktop and are not launched here; everything else is exercised.

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: powershell   # Windows PowerShell 5.1 — the exact host PasswordProtect.cmd uses

    steps:
      - uses: actions/checkout@v4

      - name: ASCII source check (PS 5.1 parse safety)
        run: |
          # Non-ASCII bytes in .ps1/.cmd sources have repeatedly broken
          # Windows PowerShell 5.1 parsing in this repo (see git history).
          # Docs are exempt; scripts must be pure ASCII.
          $ErrorActionPreference = 'Stop'
          $offenders = @()
          Get-ChildItem -Recurse -File | Where-Object { $_.Extension -in '.ps1','.psm1','.cmd' } | ForEach-Object {
            $bytes = [IO.File]::ReadAllBytes($_.FullName)
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              if ($bytes[$i] -gt 0x7F) {
                $offenders += ('{0}: byte 0x{1:X2} at offset {2}' -f $_.FullName, $bytes[$i], $i)
                break
              }
            }
          }
          if ($offenders.Count) {
            $offenders | ForEach-Object { Write-Host "NON-ASCII: $_" }
            throw "$($offenders.Count) script file(s) contain non-ASCII bytes."
          }
          Write-Host "All script sources are pure ASCII."

      - name: Syntax-check every .ps1 (AST parse)
        run: |
          $ErrorActionPreference = 'Stop'
          $bad = @()
          Get-ChildItem -Recurse -File | Where-Object { $_.Extension -in '.ps1','.psm1' } | ForEach-Object {
            $file = $_.FullName
            $tokens = $null; $perr = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$perr) | Out-Null
            foreach ($e in $perr) {
              $bad += ('{0}:{1}: {2}' -f $file, $e.Extent.StartLineNumber, $e.Message)
            }
          }
          if ($bad.Count) {
            $bad | ForEach-Object { Write-Host "PARSE ERROR: $_" }
            throw "$($bad.Count) parse error(s) found."
          }
          Write-Host "All .ps1 files parsed cleanly."

      - name: Static load check (functions define without running main)
        run: |
          $ErrorActionPreference = 'Stop'
          . .\src\Invoke-QPdf.ps1
          foreach ($fn in 'Protect-Pdf') {
            if (-not (Get-Command $fn -ErrorAction SilentlyContinue)) { throw "$fn not defined" }
          }
          # Dot-sourcing sets InvocationName to '.', so the guarded entry point
          # must NOT execute (no dialog, no exit).
          . .\PasswordProtect.ps1
          foreach ($fn in 'Format-DobPassword','Get-OutputPath') {
            if (-not (Get-Command $fn -ErrorAction SilentlyContinue)) {
              throw "$fn not defined after dot-sourcing PasswordProtect.ps1"
            }
          }
          # Spot-check a pure helper end-to-end.
          if ((Format-DobPassword -Day 1 -Month 3 -Year 1970) -ne '01031970') {
            throw "Format-DobPassword produced the wrong value"
          }
          Write-Host "Static load check passed."

      - name: Install Pester 5
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]'5.5.0' })) {
            Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck -AllowClobber
          }

      - name: Pester tests (all suites, blocking)
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -MinimumVersion 5.5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = 'pester-results.xml'
          Invoke-Pester -Configuration $cfg

      - name: Smoke-test bundled binaries (real encryption round-trips)
        run: |
          # 'Continue' (not 'Stop') so that a native tool writing to stderr -- which
          # qpdf does on the INTENTIONAL wrong-password checks below -- is not
          # escalated into a NativeCommandError. Every assertion still fails the
          # step explicitly via `throw` on a bad $LASTEXITCODE / result.
          $ErrorActionPreference = 'Continue'
          . .\src\Invoke-QPdf.ps1
          $qpdf  = (Resolve-Path .\bin\qpdf.exe).Path

          # --- the binaries must launch (proves their runtime DLLs are intact) ---
          & $qpdf --version
          if ($LASTEXITCODE -ne 0) { throw "qpdf --version exited $LASTEXITCODE" }

          # --- shared password (DOB) as a SecureString, exactly like the tool ---
          $pw = '01031970'
          $ss = New-Object System.Security.SecureString
          foreach ($c in $pw.ToCharArray()) { $ss.AppendChar($c) }
          $ss.MakeReadOnly()

          $work = Join-Path $env:RUNNER_TEMP 'pp-smoke'
          New-Item -ItemType Directory -Force -Path $work | Out-Null

          # ============ PDF round-trip (PDF path) ============
          # Hand-rolled minimal PDF with no xref; qpdf rebuilds a clean one.
          # Built as a string array (no here-string) so YAML indentation can
          # never corrupt it.
          $rawPdf = Join-Path $work 'raw.pdf'
          $pdfLines = @(
            '%PDF-1.4'
            '1 0 obj'
            '<< /Type /Catalog /Pages 2 0 R >>'
            'endobj'
            '2 0 obj'
            '<< /Type /Pages /Kids [3 0 R] /Count 1 >>'
            'endobj'
            '3 0 obj'
            '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << >> /Contents 4 0 R >>'
            'endobj'
            '4 0 obj'
            '<< /Length 40 >>'
            'stream'
            'BT /F1 24 Tf 72 720 Td (Hello CI) Tj ET'
            'endstream'
            'endobj'
            'trailer'
            '<< /Root 1 0 R >>'
            '%%EOF'
          )
          Set-Content -LiteralPath $rawPdf -Value $pdfLines -Encoding ascii

          $cleanPdf = Join-Path $work 'clean.pdf'
          & $qpdf $rawPdf $cleanPdf
          if ($LASTEXITCODE -eq 2)        { throw "qpdf could not normalize the test PDF" }  # 0 ok, 3 warnings(recovered)
          if (-not (Test-Path $cleanPdf)) { throw "qpdf did not produce clean.pdf" }

          $pdfOut = Join-Path $work 'clean_protected.pdf'
          $rp = Protect-Pdf -QpdfPath $qpdf -InputPath $cleanPdf -OutputPath $pdfOut -Password $ss
          if (-not $rp.Success)        { throw "PDF protect failed: $($rp.ErrorCode) $($rp.Stderr)" }
          if (-not (Test-Path $pdfOut)) { throw "protected PDF not created" }

          & $qpdf --is-encrypted $pdfOut
          if ($LASTEXITCODE -ne 0) { throw "output PDF is NOT encrypted (is-encrypted=$LASTEXITCODE)" }

          $dec = Join-Path $work 'dec.pdf'
          & $qpdf --password=$pw --decrypt $pdfOut $dec
          if ($LASTEXITCODE -eq 2)     { throw "qpdf rejected the CORRECT password" }
          if (-not (Test-Path $dec))   { throw "decrypted PDF missing" }

          & $qpdf --password=WRONGPASS --decrypt $pdfOut (Join-Path $work 'bad.pdf') 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 2) { throw "qpdf did NOT reject a wrong password (exit $LASTEXITCODE)" }
          Write-Host "PDF round-trip OK -> $pdfOut"

          Write-Host "All smoke tests passed."
          # The last native call above (the wrong-password check) deliberately
          # leaves $LASTEXITCODE=2; GitHub's powershell wrapper would propagate
          # that as the step result. We got here only because every assertion
          # passed, so exit cleanly.
          exit 0

      - name: E2E launcher mode (guided setup.ps1, no admin)
        run: |
          $ErrorActionPreference = 'Stop'
          $src = (Get-Location).Path
          $psExe = Join-Path $env:WINDIR 'System32\WindowsPowerShell\v1.0\powershell.exe'

          # Self-contained copy of the tool, plus sandbox locations. %ProgramData%
          # is redirected under RUNNER_TEMP so the escrow cert / audit / cache land
          # in the sandbox, not on the machine.
          $app = Join-Path $env:RUNNER_TEMP 'launcher-app'
          New-Item -ItemType Directory -Force -Path $app | Out-Null
          foreach ($sub in 'src','bin','config','admin') { Copy-Item (Join-Path $src $sub) $app -Recurse -Force }
          foreach ($f in 'setup.ps1','install.ps1','VERSION') { Copy-Item (Join-Path $src $f) $app -Force }

          $pd        = Join-Path $env:RUNNER_TEMP 'launcher-pd'
          $clientOut = Join-Path $env:RUNNER_TEMP 'shared\clients.csv'
          $escrowDir = Join-Path $env:RUNNER_TEMP 'escrow-store'
          $pfx       = Join-Path $env:RUNNER_TEMP 'escrow.pfx'
          $fixture   = Join-Path $src 'tests\fixtures\clients-sample.csv'

          # Run setup in a CHILD process (its `exit` must not end this step) and
          # capture ALL output so a setup.ps1 failure is fully visible.
          $inner = "& '$app\setup.ps1' -Mode Launcher -NonInteractive " +
                   "-ClientListPath '$clientOut' -EscrowDir '$escrowDir' -ClientSource '$fixture' " +
                   "-PfxPath '$pfx' -PfxPassword (ConvertTo-SecureString 'ci-pfx-pw-1' -AsPlainText -Force)"
          $cmd = "`$env:ProgramData='$pd'; $inner; exit `$LASTEXITCODE"
          $ErrorActionPreference = 'Continue'
          $childOut = & $psExe -NoProfile -ExecutionPolicy Bypass -Command $cmd 2>&1 | Out-String
          $rc = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          Write-Host "----- setup.ps1 (launcher) output -----"
          Write-Host $childOut
          Write-Host "----- exit=$rc -----"
          if ($rc -ne 0) { throw "setup.ps1 -Mode Launcher exited $rc" }

          if (-not (Test-Path (Join-Path $app 'config\settings.json')))        { throw "no launcher settings.json" }
          if (-not (Test-Path (Join-Path $pd  'CuroPDFProtect\escrow.cer')))   { throw "no escrow public cert" }
          if (-not (Test-Path $pfx))                                           { throw "no escrow private pfx" }
          if (@(Import-Csv -LiteralPath $clientOut).Count -ne 2)               { throw "expected 2 published clients (1 malformed row skipped)" }

          # The setup-produced config must be healthy, and the core protect chain
          # must work against it (setup -> protect -> qpdf-decrypt with the DOB).
          Import-Module (Join-Path $app 'src\Config.psm1')  -Force -DisableNameChecking
          Import-Module (Join-Path $app 'src\Protect.psm1') -Force -DisableNameChecking
          $env:ProgramData = $pd
          $cfg = Get-CuroConfig -Path (Join-Path $app 'config\settings.json')
          $health = Test-CuroHealth -Path (Join-Path $app 'config\settings.json')
          if (-not $health.Healthy) { throw "post-setup health not green: $(($health.Issues | ForEach-Object { $_.Component }) -join ', ')" }

          # qpdf writes warnings to stderr for the hand-rolled PDF; under
          # EAP=Stop that stderr escalates into a NativeCommandError. Switch to
          # Continue - every check below asserts explicitly via throw.
          $ErrorActionPreference = 'Continue'

          # Build a tiny PDF and protect it through the real chain.
          $work = Join-Path $env:RUNNER_TEMP 'launcher-protect'
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          $qpdf = $cfg.qpdf_path
          $raw = Join-Path $work 'raw.pdf'
          @('%PDF-1.4','1 0 obj','<< /Type /Catalog /Pages 2 0 R >>','endobj','2 0 obj','<< /Type /Pages /Kids [3 0 R] /Count 1 >>','endobj','3 0 obj','<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] >>','endobj','trailer','<< /Root 1 0 R >>','%%EOF') | Set-Content -LiteralPath $raw -Encoding ascii
          $doc = Join-Path $work 'doc.pdf'
          & $qpdf $raw $doc 2>&1 | Out-Null
          $ss = New-Object System.Security.SecureString
          foreach ($c in '01031990'.ToCharArray()) { $ss.AppendChar($c) }   # O'Brien DOB from the fixture
          $ss.MakeReadOnly()
          $prompt = [pscustomobject]@{ SecurePassword=$ss; PasswordSource='dob'; ClientFileRef='C-00502'; DeleteOriginal=$false; AllowOverwrite=$false; OpenOutlook=$false; Cancelled=$false }
          $res = Invoke-ProtectFileCore -Config $cfg -Path $doc -PromptResult $prompt
          if (-not $res.Success) { throw "protect through setup config failed: $($res.Message)" }
          $out = Join-Path $work 'doc_protected.pdf'
          if (-not (Test-Path $out)) { throw "protected PDF not produced" }
          & $qpdf --password=01031990 --decrypt $out (Join-Path $work 'dec.pdf') 2>&1 | Out-Null
          if (($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 3)) { throw "decrypt with the DOB failed ($LASTEXITCODE)" }
          if (@(Get-ChildItem -Path $escrowDir -Filter '*.escrow.json' -Recurse).Count -lt 1) { throw "no escrow sidecar written" }
          Write-Host "Launcher E2E OK: guided setup -> healthy -> protect -> decrypt with DOB -> escrow sidecar."
          exit 0

      - name: E2E install mode (machine-wide install + uninstall)
        run: |
          # The runner is admin, so exercise the real install path: payload
          # copy + hash verify + HKLM context menus (with -STA) + ProgramData
          # settings, then uninstall and confirm the audit log is preserved.
          $ErrorActionPreference = 'Stop'
          $src = (Get-Location).Path
          $installDir = Join-Path $env:RUNNER_TEMP 'CuroInstall'

          & .\install.ps1 -SourcePath $src -InstallDir $installDir -NoExplorerRestart -Silent
          foreach ($rel in 'src\Protect-File.ps1','bin\qpdf.exe','admin\Recover-File.ps1') {
            if (-not (Test-Path (Join-Path $installDir $rel))) { throw "install did not place $rel" }
          }
          $pd = 'C:\ProgramData\CuroPDFProtect'
          if (-not (Test-Path (Join-Path $pd 'settings.json'))) { throw "install did not write ProgramData settings.json" }

          # Every registered context-menu command must carry -STA. Read via the
          # .NET registry API - the ProgID key is literally "*", which the
          # PowerShell provider would treat as a wildcard.
          function Get-CommandValue($sub) {
            $k = [Microsoft.Win32.Registry]::LocalMachine.OpenSubKey($sub)
            if (-not $k) { return $null }
            try { return $k.GetValue('') } finally { $k.Close() }
          }
          $subs = @(
            'Software\Classes\*\shell\CuroProtectWithPassword\command',
            'Software\Classes\*\shell\CuroProtectAndEmail\command',
            'Software\Classes\Directory\shell\CuroProtectFolder\command'
          )
          foreach ($sub in $subs) {
            $cmd = Get-CommandValue $sub
            if (-not $cmd) { throw "missing context-menu key: $sub" }
            if ($cmd -notmatch '\-STA') { throw "context-menu command lacks -STA: $cmd" }
          }
          Write-Host "Install OK: payload + ProgramData settings + 3 HKLM keys with -STA."

          # ACL: settings.json must be read-only for Users; audit.log writable.
          # (Runners run elevated, so prove intent by ACE inspection.)
          function User-Rights($path) {
            (Get-Acl -LiteralPath $path).Access |
              Where-Object { $_.IdentityReference -match 'Users$' -and $_.AccessControlType -eq 'Allow' } |
              ForEach-Object { $_.FileSystemRights.ToString() }
          }
          $sRights = (User-Rights (Join-Path $pd 'settings.json')) -join ';'
          if ($sRights -match 'Modify|FullControl|\bWrite') { throw "Users have write on settings.json: $sRights" }
          $aRights = (User-Rights (Join-Path $pd 'audit.log')) -join ';'
          if ($aRights -notmatch 'Modify|FullControl|\bWrite') { throw "Users cannot write the audit log: $aRights" }
          Write-Host "ACL OK: settings.json read-only for Users ($sRights); audit.log writable ($aRights)."

          # Drop a fake audit row, then uninstall WITHOUT -PurgeAuditLog and
          # confirm it survives (7-year retention) while keys + dir are gone.
          Set-Content -LiteralPath (Join-Path $pd 'audit.log') -Value '{"op":"test"}' -Encoding utf8
          & .\uninstall.ps1 -InstallDir $installDir -NoExplorerRestart
          if (Test-Path $installDir)                { throw "uninstall left the install dir behind" }
          if (Get-CommandValue $subs[0])            { throw "uninstall left a context-menu key behind" }
          if (-not (Test-Path (Join-Path $pd 'audit.log'))) { throw "uninstall wrongly deleted the audit log" }
          Write-Host "Uninstall OK: keys + dir removed, audit log preserved."

      - name: Tampered / unpinned binary is refused at install
        run: |
          $ErrorActionPreference = 'Stop'
          $src = (Get-Location).Path
          function New-Source([string]$dest) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            foreach ($sub in 'src','bin','config','admin') { Copy-Item (Join-Path $src $sub) $dest -Recurse -Force }
            foreach ($f in 'install.ps1','uninstall.ps1','VERSION') { Copy-Item (Join-Path $src $f) $dest -Force }
          }
          # (a) A flipped byte in a pinned DLL must be refused, naming the file.
          $badA = Join-Path $env:RUNNER_TEMP 'src-tampered'
          New-Source $badA
          $dll = Join-Path $badA 'bin\qpdf29.dll'
          $b = [IO.File]::ReadAllBytes($dll); $b[200] = $b[200] -bxor 0xFF; [IO.File]::WriteAllBytes($dll, $b)
          $threw = $false; $msg = ''
          try { & "$badA\install.ps1" -SourcePath $badA -InstallDir (Join-Path $env:RUNNER_TEMP 'InstBadA') -NoExplorerRestart -Silent }
          catch { $threw = $true; $msg = $_.Exception.Message }
          if (-not $threw)            { throw "install did NOT refuse a tampered qpdf29.dll" }
          if ($msg -notmatch 'qpdf29\.dll') { throw "refusal did not name qpdf29.dll: $msg" }
          Write-Host "Refused tampered DLL: $msg"

          # (b) An unpinned extra binary must be refused.
          $badB = Join-Path $env:RUNNER_TEMP 'src-unpinned'
          New-Source $badB
          Set-Content -LiteralPath (Join-Path $badB 'bin\evil.dll') -Value 'x' -Encoding ascii
          $threw = $false; $msg = ''
          try { & "$badB\install.ps1" -SourcePath $badB -InstallDir (Join-Path $env:RUNNER_TEMP 'InstBadB') -NoExplorerRestart -Silent }
          catch { $threw = $true; $msg = $_.Exception.Message }
          if (-not $threw)          { throw "install did NOT refuse an unpinned binary" }
          if ($msg -notmatch 'evil\.dll') { throw "refusal did not name evil.dll: $msg" }
          Write-Host "Refused unpinned binary: $msg"

      - name: Upload test results / crash log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-artifacts
          path: |
            pester-results.xml
            PasswordProtect-error.log
          if-no-files-found: ignore
